info:
  name: Create User
  type: http
  seq: 1

http:
  method: POST
  url: "{{API_URL}}/users/"
  body:
    type: json
    data: |-
      {
        "name": "Teste",
        "nickname": "testenick",
        "email": "teste@teste.com",
        "password": "12345"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
